<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#12080F">
<title>코인차트 — 실시간 분석</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js" integrity="sha384-JZigAjwiaZtkUbA44CWkPaT3iBb/mU5pO6QOANp+OqHd4q+1+7MG1kzp2OOP9ZfP" crossorigin="anonymous"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- ===== 화면 1: 가입 / 로그인 ===== -->
<section id="screen-auth" class="screen active">
  <div class="auth-hero">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 17 9 10l4 4 7-9" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="20" cy="5" r="2.4" fill="#fff"/></svg>
    </div>
    <h1>가입은 10초,<br>구글로 바로 시작</h1>
    <p>실시간 코인 차트와 기술적 분석을<br>손안에서 바로.</p>
  </div>
  <div class="auth-body">
    <div id="gsi-button"></div>
    <button id="btn-guest" class="btn-guest">게스트로 둘러보기</button>
    <p class="fine-print">계속 진행하면 이용약관 및 개인정보처리방침에 동의하는 것으로 간주됩니다.</p>
  </div>
</section>

<!-- ===== 화면 2: 홈 (코인 리스트) ===== -->
<section id="screen-home" class="screen">
  <header class="topbar">
    <span class="logo">코인차트</span>
    <div class="topbar-right">
      <div id="fng-badge" class="fng-badge">공포탐욕 —</div>
      <div id="conn-dot" class="conn-dot" title="실시간 연결 상태"></div>
    </div>
  </header>

  <div class="search-row">
    <input id="coin-search" type="search" placeholder="코인 검색 (BTC, ETH...)" autocomplete="off">
  </div>

  <div class="fav-strip" id="fav-strip"></div>

  <div class="coin-list" id="coin-list">
    <div class="list-loading">시세 불러오는 중…</div>
  </div>
</section>

<!-- ===== 화면 3: 차트 ===== -->
<section id="screen-chart" class="screen">
  <header class="topbar chart-top">
    <button class="btn-back" id="btn-back" aria-label="뒤로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="22" height="22"><path d="M15 5l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="chart-title">
      <b id="chart-sym">BTCUSDT</b>
      <span id="chart-price" class="chart-price">—</span>
      <span id="chart-chg" class="chart-chg">—</span>
    </div>
    <button class="btn-fav" id="btn-fav" aria-label="즐겨찾기">★</button>
  </header>

  <div class="tf-row" id="tf-row">
    <button data-tf="1m">1분</button>
    <button data-tf="5m">5분</button>
    <button data-tf="15m" class="on">15분</button>
    <button data-tf="1h">1H</button>
    <button data-tf="4h">4H</button>
    <button data-tf="1d">1D</button>
    <button data-tf="1w">주봉</button>
  </div>

  <div class="ind-row" id="ind-row">
    <button data-ind="ma" class="on">MA</button>
    <button data-ind="bb">볼린저</button>
    <button data-ind="vwap">VWAP</button>
    <button data-ind="fib">피보</button>
    <button data-ind="st">슈퍼T</button>
    <button data-ind="vpvr">VPVR</button>
    <button data-ind="rsi" class="on">RSI</button>
    <button data-ind="macd">MACD</button>
  </div>

  <div id="chart-main" class="chart-box">
    <canvas id="vpvr-canvas"></canvas>
  </div>
  <div id="chart-sub" class="chart-sub"></div>
</section>

<!-- ===== 화면 4: 정보 (매크로 + 캘린더) ===== -->
<section id="screen-info" class="screen">
  <header class="topbar">
    <span class="logo">마켓 정보</span>
  </header>
  <div class="info-scroll">
    <div class="macro-grid" id="macro-grid">
      <div class="macro-card"><span class="mc-label">공포탐욕</span><b id="m-fng">—</b></div>
      <div class="macro-card"><span class="mc-label">달러지수 DXY</span><b id="m-dxy">—</b></div>
      <div class="macro-card"><span class="mc-label">BTC 펀딩비</span><b id="m-fund">—</b></div>
      <div class="macro-card"><span class="mc-label">BTC 미결제약정</span><b id="m-oi">—</b></div>
    </div>

    <h2 class="sec-ttl">이번 주 경제 일정 <span class="sec-sub">고임팩트 · USD</span></h2>
    <div class="cal-list" id="cal-list"><div class="list-loading">불러오는 중…</div></div>

    <h2 class="sec-ttl">외부 리소스</h2>
    <div class="link-list">
      <a href="https://www.coinglass.com/LiquidationData" target="_blank" rel="noopener">Coinglass — 청산맵</a>
      <a href="https://cryptoquant.com/asset/btc/summary" target="_blank" rel="noopener">CryptoQuant — 온체인</a>
      <a href="https://coinness.com" target="_blank" rel="noopener">Coinness — 뉴스</a>
      <a href="https://farside.co.uk/btc/" target="_blank" rel="noopener">Farside — ETF 자금흐름</a>
      <a href="https://www.sec.gov/newsroom/whats-new" target="_blank" rel="noopener">SEC — 규제 소식</a>
    </div>
  </div>
</section>

<!-- ===== 하단 탭바 ===== -->
<nav class="tabbar" id="tabbar">
  <button data-tab="home" class="on">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1Z"/></svg>
    <span>홈</span>
  </button>
  <button data-tab="chart">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 17 9 10l4 4 7-9" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>차트</span>
  </button>
  <button data-tab="info">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8v.5" stroke-linecap="round"/></svg>
    <span>정보</span>
  </button>
</nav>

<script src="app.js"></script>
</body>
</html>
